version: "3.9"

# -----------------------------------------------------------------------
# plum-claims local development stack
#
#   backend  : FastAPI app (app.main:app) on http://localhost:8000
#   frontend : Vite dev server on http://localhost:5173
#
# Usage:
#   1. Copy backend/.env.example to backend/.env and fill in GEMINI_API_KEY
#      (optional -- only required for live document extraction; the eval
#      harness and test suite do not need it).
#   2. docker compose up --build
#
# No Dockerfiles are required: both services run their tooling directly
# against bind-mounted source for fast local iteration. For production,
# replace these with multi-stage Dockerfiles (uvicorn worker image /
# static Vite build served via nginx).
# -----------------------------------------------------------------------

services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -e '.[dev]' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: "8000"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      POLICY_DATA_PATH: /data/policy_terms.json
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gemini-2.5-flash}
    env_file:
      - path: ./backend/.env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: node:20-slim
    working_dir: /app
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  frontend_node_modules: